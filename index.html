<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00ffee;--bg:#02070d;--panel:#061018}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#fff;font-family:Rajdhani,sans-serif;overflow-x:hidden}
#commandHeader{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center;padding:18px 24px;background:linear-gradient(180deg,#07141c,#050b12);background-image:linear-gradient(180deg,rgba(7,20,28,0.88),rgba(5,11,18,0.92)),url('BSG BLACK GOLD.png');background-size:cover;background-position:center;border-bottom:2px solid #00ffee55}
.brand-wrap{display:flex;align-items:center;gap:15px}
.radar-logo,.footer-radar{width:72px;height:72px;border-radius:50%;border:1px solid #00ffee88;box-shadow:0 0 16px #00ffee55;animation:radarPulse 4s infinite;transition:box-shadow 0.3s ease}
@keyframes radarPulse{50%{box-shadow:0 0 26px #00ffeeaa}}
.brand-wrap:hover .radar-logo{box-shadow:0 0 30px #00ffee,0 0 60px #00ffee,0 0 100px #00ffee88;animation:none}
.callsign{font-size:30px;font-weight:700;letter-spacing:2px;color:#06161c;text-shadow:0 0 27px #00ffee,0 0 50px #00ffee88;transition:text-shadow 0.3s ease;cursor:default}
.brand-wrap:hover .callsign{text-shadow:0 0 30px #00ffee,0 0 60px #00ffee,0 0 100px #00ffee,0 0 140px #00ffee,0 0 200px #00ffee,0 0 280px #00ffeedd,0 0 380px #00ffeecc,0 0 500px #00ffeeaa}
.subline{font-size:16px;letter-spacing:4px;color:#fff;text-shadow:0 0 10px #00ffee,0 0 20px #00ffee88;transition:font-size 0.3s ease,text-shadow 0.3s ease}
.OSINT.PLATFORM-sub{font-size:16px;letter-spacing:4px;color:#00ffee;transition:font-size 0.3s ease,text-shadow 0.3s ease}
.brand-wrap:hover .subline,.brand-wrap:hover .OSINT.PLATFORM-sub{font-size:22px;text-shadow:0 0 14px #00ffee,0 0 28px #00ffee,0 0 56px #00ffee88}
.header-center{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
.command-btn{padding:10px 14px;border:1px solid #00ffee66;background:#081821;color:#00ffee;font-family:'Share Tech Mono';cursor:pointer;transition:transform 0.15s ease,box-shadow 0.15s ease,background 0.15s ease,text-shadow 0.15s ease}
.command-btn:hover{background:#0c2430;transform:translateY(-2px);box-shadow:0 0 18px #00ffee88,0 0 36px #00ffee44,0 0 54px #00ffee22;text-shadow:0 0 8px #00ffee;border-color:#00ffeebb}
.command-btn.active{background:#0c2430;box-shadow:0 0 14px #00ffee77,0 0 28px #00ffee44,0 0 42px #00ffee22;border-color:#00ffeedd;text-shadow:0 0 6px #00ffee}
.drawer-toggle:hover{box-shadow:0 0 18px #00ffee88,0 0 36px #00ffee44;text-shadow:0 0 8px #00ffee;transform:translateY(-1px)}
.channel:hover{background:#0c2430!important;box-shadow:0 0 12px #00ffee66;text-shadow:0 0 8px #00ffee;color:#00ffee}
#gmtClock{text-align:center;color:#00ffee;width:100%;cursor:pointer;user-select:none}
#gmtClock:hover{text-shadow:0 0 8px #00ffee}
#africaTimePanel{display:none;position:absolute;top:100%;left:50%;transform:translateX(-50%);z-index:10000;width:min(960px,92vw);max-height:80vh;overflow-y:auto;border-radius:12px;box-shadow:0 8px 40px rgba(0,255,238,0.15),0 0 1px #00ffee44}
#africaTimePanel.open{display:block}
#africaTimeWidget{font-family:Rajdhani,sans-serif;background:#061018;color:#f1f5f9;border-radius:12px;padding:16px;box-sizing:border-box;border:1px solid #00ffee44}
#africaTimeWidget h2{text-align:center;color:#00ffee;margin-bottom:10px;margin-top:0;font-family:'Share Tech Mono',monospace;letter-spacing:2px;text-shadow:0 0 10px #00ffee88}
#africaTimeWidget input,#africaTimeWidget select{width:100%;padding:8px;margin-bottom:10px;border-radius:8px;border:1px solid #00ffee44;background:#081821;color:#00ffee;box-sizing:border-box;font-family:'Share Tech Mono',monospace}
.atw-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.atw-card{background:#081821;border:1px solid #00ffee33;border-radius:10px;padding:12px;transition:0.3s;cursor:default}
.atw-card:hover{border-color:#00ffee;box-shadow:0 0 15px rgba(0,255,238,0.3)}
.atw-card.highlight{border-color:#00ffee;box-shadow:0 0 25px rgba(0,255,238,0.9);transform:scale(1.05)}
.atw-flag{font-size:20px;margin-right:8px}
.atw-country{font-weight:bold;margin-bottom:4px;display:flex;align-items:center}
.atw-city{font-size:14px;margin-bottom:8px;color:#7fd6df}
.atw-time{font-family:'Share Tech Mono',monospace;font-size:20px;color:#00ffee;font-weight:bold;text-shadow:0 0 6px #00ffee88}
.atw-date{color:#7fd6df;font-size:13px;margin-top:4px}
.atw-toggle-container{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px}
.atw-small-button{background:#081821;border:1px solid #00ffee66;color:#00ffee;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:bold;flex-grow:1;font-family:'Share Tech Mono',monospace;transition:background 0.15s,box-shadow 0.15s,text-shadow 0.15s}
.atw-small-button:hover{background:#0c2430;box-shadow:0 0 18px #00ffee88;text-shadow:0 0 8px #00ffee}
.atw-set-btn{background:none;border:1px solid #00ffee55;color:#00ffee;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;margin-top:6px;transition:background 0.15s,box-shadow 0.15s}
.atw-set-btn:hover{background:#0c2430;box-shadow:0 0 12px #00ffee66}
.atw-set-btn.active{background:#00ffee;color:#061018;font-weight:bold}
#atwSearchBox{flex-grow:3}
.header-right{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.market-box{padding:4px 8px;text-align:center}
.market-price{font-size:24px;color:#00ffee}
#breakingBanner{background:#0a0000;border-bottom:1px solid #ff2200aa;padding:0;overflow:hidden;display:none}
#breakingBanner.active{display:block}
.breaking-inner{display:flex;align-items:center;height:32px}
.breaking-tag{background:#ff2200;color:#fff;font-family:'Share Tech Mono';font-size:12px;font-weight:700;padding:0 12px;height:100%;display:flex;align-items:center;letter-spacing:1px;animation:breakingPulse 1.5s infinite}
@keyframes breakingPulse{50%{background:#cc0000}}
.breaking-scroll{flex:1;overflow:hidden;display:flex;align-items:center}.breaking-track{display:inline-flex;align-items:center;white-space:nowrap;padding-left:100%;animation:scroll 120s linear infinite}
.breaking-link{display:inline-block;padding-right:60px;color:#ff8866;text-decoration:none;font-size:13px;font-family:'Share Tech Mono'}
.breaking-link:hover{color:#ffaa88}
#newsTickerWrap{display:flex;height:42px;background:#050b12;border-top:1px solid #00ffee55;border-bottom:1px solid #00ffee55;overflow:hidden}
.channel{background:#071923;border:none;color:#7fd6df;padding:0 14px;cursor:pointer;font-family:'Share Tech Mono';font-size:12px;white-space:nowrap;transition:background 0.15s,color 0.15s,text-shadow 0.15s,box-shadow 0.15s}.channel.active{background:#0c2430;color:#00ffee;font-weight:700;text-shadow:0 0 8px #00ffee;box-shadow:inset 0 -2px 0 #00ffee}
.channel-wrap{display:flex;overflow-x:auto;flex-shrink:0}
.ticker-window{flex:1;overflow:hidden;display:flex;align-items:center}.ticker-track{display:inline-flex;align-items:center;white-space:nowrap;padding-left:100%;animation:scroll 150s linear infinite;font-size:18px}
@keyframes scroll{100%{transform:translateX(-100%)}}
.headline-link{display:inline-block;padding-right:95px;color:#d7ffff;text-decoration:none;font-size:18px;line-height:42px}
.placeholder{height:calc(100vh - 126px);display:flex;justify-content:center;align-items:center}
.ops-bay{width:min(1500px,96%);height:78vh;border:1px solid #00ffee44;background:#040b10;overflow:hidden}
#opsShell{height:100%;display:grid;grid-template-columns:1fr;overflow:hidden;position:relative}
#opsMenu{position:absolute;top:0;left:0;z-index:50;width:48px;height:100%;background:#061018;border-right:1px solid #00ffee44;overflow:hidden;transition:width 0.3s ease}
#opsMenu:hover,#opsMenu.open{width:280px;overflow-y:auto}
#opsMenu .menu-content{opacity:0;pointer-events:none;transition:opacity 0.2s ease;padding:0 18px 18px}
#opsMenu:hover .menu-content,#opsMenu.open .menu-content{opacity:1;pointer-events:auto}
.drawer-toggle{width:100%;padding:10px;margin-bottom:18px;background:#081821;border:1px solid #00ffee55;color:#00ffee;cursor:pointer;font-family:'Share Tech Mono';transition:transform 0.15s ease,box-shadow 0.15s ease,text-shadow 0.15s ease}
.panel-trigger{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:#081821;border:none;border-bottom:1px solid #00ffee44;color:#00ffee;cursor:pointer;font-size:20px;font-family:'Share Tech Mono'}
.panel-trigger:hover{background:#0c2430;text-shadow:0 0 8px #00ffee}
#opsShell.fullscreen #opsMenu{display:none}
#opsShell.fullscreen #opsViewport{margin-left:0}
#opsViewport{margin-left:48px}
.feed-panel{position:relative;background:#000;border:1px solid #0f2730}
.feed-label{position:absolute;top:10px;left:10px;padding:6px 10px;background:rgba(3,22,29,.8);border:1px solid #00ffee66;color:#00ffee;z-index:2}
iframe,.map-frame{width:100%;height:100%;border:none}
#marineFrame iframe{filter:invert(92%) hue-rotate(180deg) grayscale(.85)}
#flightFrame iframe{filter:invert(92%) hue-rotate(180deg) grayscale(.9) brightness(.6) contrast(1.2)}
#commandFooter{padding:28px;display:flex;flex-direction:column;align-items:center;background:linear-gradient(180deg,#050b12,#07141c);border-top:2px solid #00ffee55;position:relative}
.version{position:absolute;right:20px;bottom:12px;font-size:11px;color:#00ffee55;font-family:'Share Tech Mono'}
a{color:#00ffee;text-decoration:none}
#splashScreen{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#02070d;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:99999;transition:opacity 0.5s ease}
#splashScreen.fade-out{opacity:0}
#splashScreen video{width:140px;height:140px;border-radius:50%;border:1px solid #00ffee88;box-shadow:0 0 30px #00ffee,0 0 60px #00ffee55;animation:radarPulse 2s infinite}
#splashScreen .splash-title{margin-top:20px;font-size:28px;font-weight:700;letter-spacing:3px;color:#06161c;text-shadow:0 0 30px #00ffee,0 0 60px #00ffee,0 0 100px #00ffee88}
#splashScreen .splash-sub{font-size:13px;letter-spacing:6px;color:#00ffee;margin-top:6px;font-family:'Share Tech Mono'}
.loader-wrap{margin-top:32px;width:260px;height:3px;background:#0a1a22;border-radius:2px;overflow:hidden}
.loader-bar{width:0;height:100%;background:linear-gradient(90deg,#00ffee,#00ffeedd);border-radius:2px;animation:loadBar 3s ease-in-out forwards}
@keyframes loadBar{0%{width:0}100%{width:100%}}

</head>

<script>
setTimeout(()=>{let s=document.getElementById('splashScreen');s.classList.add('fade-out');setTimeout(()=>s.remove(),500)},3000);
let headerTz=null,headerTzLabel='',headerTzIso='';
function updateClock(){const now=new Date();const flagEl=document.getElementById('gmtClockFlag');if(headerTz){const time=new Intl.DateTimeFormat('en-GB',{timeZone:headerTz,weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(now);gmtClock.textContent=time+' | '+headerTzLabel;if(flagEl){flagEl.innerHTML=`<img src='https://flagcdn.com/w80/${headerTzIso}.png' alt='${headerTzLabel.replace(/'/g,"&#39;")}' style='width:36px;height:auto;border-radius:3px'>`;flagEl.style.display='block'}}else{gmtClock.textContent=now.toUTCString().replace('GMT','GMT / ZULU');if(flagEl){flagEl.innerHTML='';flagEl.style.display='none'}}}setInterval(updateClock,1000);updateClock();
function setHeaderTime(tz,label,iso){headerTz=tz;headerTzLabel=label;headerTzIso=iso||'';updateClock();atwRender();atwUpdateTimes()}

let africaTimePanelOpen=false,africaTimeHideTimer=null;
function toggleAfricaTime(){const p=document.getElementById('africaTimePanel');if(africaTimePanelOpen){p.classList.remove('open');africaTimePanelOpen=false}else{p.classList.add('open');africaTimePanelOpen=true;atwRender();atwUpdateTimes()}}
function scheduleAfricaTimeHide(){africaTimeHideTimer=setTimeout(()=>{document.getElementById('africaTimePanel').classList.remove('open');africaTimePanelOpen=false},600)}
function clearAfricaTimeHide(){if(africaTimeHideTimer){clearTimeout(africaTimeHideTimer);africaTimeHideTimer=null}}
function openCountryView(){if(!headerTzLabel)return;const p=document.getElementById('africaTimePanel');if(!africaTimePanelOpen){p.classList.add('open');africaTimePanelOpen=true}atwViewCountry(headerTzLabel,headerTzIso)}
const atwAllCities=[
{iso:"dz",name:"Algeria",city:"Algiers",tz:"Africa/Algiers"},

let atwGrid=document.getElementById('atwCityGrid');
let atwSearchBox=document.getElementById('atwSearchBox');

let atwToggleBtn=document.getElementById('atwToggleShow');

const atwOriginalHTML=document.getElementById('africaTimeWidget').innerHTML;
function atwGetFiltered(){const q=atwSearchBox.value.toLowerCase();return atwAllCities.filter(c=>c.name.toLowerCase().includes(q)||c.city.toLowerCase().includes(q))}

const exchFixedCurrencies=[{code:'USD',country:'United States Dollar'},{code:'GBP',country:'United Kingdom Pound'},{code:'EUR',country:'Euro'},{code:'CAD',country:'Canadian Dollar'},{code:'RUB',country:'Russian Ruble'},{code:'CNY',country:'Chinese Yuan'}];
const exchAfricanCurrencies=[{code:'NGN',country:'Nigeria'},{code:'XOF',country:'Benin (XOF)'},{code:'XOF',country:'Burkina Faso (XOF)'},{code:'XOF',country:'Guinea-Bissau (XOF)'},{code:'XOF',country:"Ivory Coast (XOF)"},{code:'XOF',country:'Mali (XOF)'},{code:'XOF',country:'Niger (XOF)'},{code:'XOF',country:'Senegal (XOF)'},{code:'XOF',country:'Togo (XOF)'},{code:'XAF',country:'Cameroon (XAF)'},{code:'XAF',country:'Central African Republic (XAF)'},{code:'XAF',country:'Chad (XAF)'},{code:'XAF',country:'Republic of the Congo (XAF)'},{code:'XAF',country:'Equatorial Guinea (XAF)'},{code:'XAF',country:'Gabon (XAF)'},{code:'KES',country:'Kenya (Shilling)'},{code:'GHS',country:'Ghana (Cedi)'},{code:'EGP',country:'Egypt (Pound)'},{code:'MAD',country:'Morocco (Dirham)'},{code:'DZD',country:'Algeria (Dinar)'},{code:'TND',country:'Tunisia (Dinar)'},{code:'SLL',country:'Sierra Leone (Leone)'},{code:'LRD',country:'Liberia (Dollar)'},{code:'ETB',country:'Ethiopia (Birr)'},{code:'TZS',country:'Tanzania (Shilling)'},{code:'UGX',country:'Uganda (Shilling)'},{code:'RWF',country:'Rwanda (Franc)'},{code:'BIF',country:'Burundi (Franc)'},{code:'MWK',country:'Malawi (Kwacha)'},{code:'MZN',country:'Mozambique (Metical)'},{code:'SZL',country:'Eswatini (Lilangeni)'},{code:'NAD',country:'Namibia (Dollar)'},{code:'BWP',country:'Botswana (Pula)'},{code:'ZMW',country:'Zambia (Kwacha)'},{code:'CDF',country:'DR Congo (Franc)'},{code:'SCR',country:'Seychelles (Rupee)'},{code:'MUR',country:'Mauritius (Rupee)'},{code:'SOS',country:'Somalia (Shilling)'},{code:'DJF',country:'Djibouti (Franc)'},{code:'ERN',country:'Eritrea (Nakfa)'},{code:'LSL',country:'Lesotho (Loti)'},{code:'AOA',country:'Angola (Kwanza)'},{code:'GMD',country:'Gambia (Dalasi)'},{code:'STD',country:'Sao Tome and Principe (Dobra)'},{code:'LYD',country:'Libya (Dinar)'},{code:'ZAR',country:'South Africa (Rand)'}].sort((a,b)=>a.country.localeCompare(b.country));
function exchPopulate(){const all=[...exchFixedCurrencies,...exchAfricanCurrencies];const opts=all.map(c=>`<option value="${c.code}">${c.code} - ${c.country}</option>`).join('');const f=document.getElementById('exchFrom');const t=document.getElementById('exchTo');if(f&&t){f.innerHTML=opts;t.innerHTML=opts;f.value='USD';t.value='NGN'}}
async function exchFetchRates(base){const r=await fetch('https://api.exchangerate-api.com/v4/latest/'+base);const d=await r.json();return d.rates}
async function exchUpdateTable(){try{const rates=await exchFetchRates('NGN');const pairs={gbp:'GBP',usd:'USD',cad:'CAD',eur:'EUR',rub:'RUB',cny:'CNY',zar:'ZAR'};for(const[id,code]of Object.entries(pairs)){const el=document.getElementById('rate-'+id);if(el){const rate=rates[code];el.textContent=rate?(1/rate).toFixed(2):'0.00'}}}catch(e){}}
async function exchConvert(){const amount=parseFloat(document.getElementById('exchAmount').value);const from=document.getElementById('exchFrom').value;const to=document.getElementById('exchTo').value;const res=document.getElementById('exchResult');const err=document.getElementById('exchError');if(isNaN(amount)||amount<=0){err.textContent='Please enter a valid amount.';res.textContent='';return}err.textContent='';res.textContent='';try{const rates=await exchFetchRates(from);const rate=rates[to];if(rate){res.textContent=amount+' '+from+' = '+(amount*rate).toFixed(2)+' '+to}else{res.textContent='Conversion not available.'}}catch(e){res.textContent='';err.textContent='Failed to fetch rates.'}}

newsBtn.onclick=loadNews;mapBtn.onclick=loadConflict;marineBtn.onclick=loadMarine;flightBtn.onclick=loadFlight;marketsBtn.onclick=loadMarkets;headlinesBtn.onclick=loadHeadlines;

`,`<div id='headlinesFrame' style='height:100%;overflow-y:auto;padding:20px;background:#061018'></div>`);fetchAllHeadlines()}
async function fetchAllHeadlines(){
const frame=document.getElementById('headlinesFrame');
frame.innerHTML='<div style="text-align:center;color:#00ffee;font-family:Share Tech Mono,monospace;padding:40px">Loading headlines...</div>';
let allItems=[];
for(let i=0;i<rss.length;i++){try{let r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(rss[i]));let d=await r.json();d.items.slice(0,10).forEach(item=>{const img=item.thumbnail||item.enclosure&&item.enclosure.link||'';allItems.push({title:item.title,link:item.link,pubDate:item.pubDate,source:tags[i],img:img})})}catch(e){}}
allItems.sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
if(!allItems.length){frame.innerHTML='<div style="text-align:center;color:#ff4444;padding:40px">No headlines available.</div>';return}
frame.innerHTML='<h2 style="text-align:center;color:#00ffee;font-family:Share Tech Mono,monospace;letter-spacing:2px;text-shadow:0 0 10px #00ffee88;margin-bottom:20px">HEADLINES</h2><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">'+allItems.map(i=>`<a href='${safeHref(i.link)}' target='_blank' style='text-decoration:none;display:block'><div style='background:#081821;border:1px solid #00ffee33;border-radius:8px;overflow:hidden;transition:border-color 0.15s,box-shadow 0.15s,transform 0.15s;height:100%'onmouseenter="this.style.borderColor='#00ffee';this.style.boxShadow='0 0 12px #00ffee44';this.style.transform='translateY(-2px)'"onmouseleave="this.style.borderColor='#00ffee33';this.style.boxShadow='none';this.style.transform='none'">${i.img?`<img src='${esc(i.img).replace(/'/g,"&#39;")}' style='width:100%;height:140px;object-fit:cover;display:block;background-color:#0a1520' onerror="this.style.display='none'">`:''}<div style='padding:12px'><div style='color:#00ffee;font-family:Share Tech Mono,monospace;font-size:11px;margin-bottom:6px'>[${esc(i.source)}]</div><div style='color:#f1f5f9;font-family:Rajdhani,sans-serif;font-size:14px;line-height:1.3'>${esc(i.title)}</div><div style='color:#7fd6df;font-size:11px;margin-top:8px;font-family:Share Tech Mono,monospace'>${i.pubDate?new Date(i.pubDate).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):''}</div></div></div></a>`).join('')+'</div>'}
const rss=[
'https://www.aljazeera.com/xml/rss/all.xml',
'https://news.google.com/rss/search?q=site:apnews.com&hl=en-US&gl=US&ceid=US:en',
'https://feeds.bbci.co.uk/news/world/rss.xml',
'https://www.cnbc.com/id/100003114/device/rss/rss.html',
'https://rss.dw.com/xml/rss-en-all',
'https://www.euronews.com/rss?format=xml',
'https://www.france24.com/en/rss',
'https://www.theguardian.com/world/rss',
'https://news.google.com/rss/search?q=site:reuters.com+world&hl=en-US&gl=US&ceid=US:en',
'https://www.rt.com/rss/news/',
'https://feeds.skynews.com/feeds/rss/world.xml'
];
const tags=['AJ','AP','BBC','CNBC','DW','EURO','FR24','GUARDIAN','REUTERS','RT','SKY'];let cf=0;
document.querySelectorAll('#newsTickerWrap .channel').forEach((b,i)=>b.onclick=()=>{document.querySelectorAll('#newsTickerWrap .channel').forEach(x=>x.classList.remove('active'));b.classList.add('active');cf=i;loadTicker()});
async function loadTicker(){try{let r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(rss[cf]));let d=await r.json();newsTicker.innerHTML=d.items.slice(0,10).map(i=>`<a class='headline-link' href='${safeHref(i.link)}' target='_blank'>[${tags[cf]}] ${esc(i.title)}</a>`).join('')}catch(e){newsTicker.innerHTML='Tactical Feed Offline...'}}

const breakingFeeds=['https://feeds.bbci.co.uk/news/world/rss.xml','https://news.google.com/rss/search?q=site:reuters.com+world&hl=en-US&gl=US&ceid=US:en','https://news.google.com/rss/search?q=site:apnews.com&hl=en-US&gl=US&ceid=US:en'];
const breakingSources=['BBC','REUTERS','AP'];
let seenBreaking=new Set();
async function checkBreaking(){
let allItems=[];
for(let i=0;i<breakingFeeds.length;i++){
try{let r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(breakingFeeds[i]));let d=await r.json();
d.items.slice(0,5).forEach(item=>{
let title=item.title.toLowerCase();
if(title.includes('breaking')||title.includes('urgent')||title.includes('just in')||title.includes('developing')){
if(!seenBreaking.has(item.link)){seenBreaking.add(item.link);allItems.push({source:breakingSources[i],title:item.title,link:item.link})}}
})}catch(e){}}
let banner=document.getElementById('breakingBanner');
let track=document.getElementById('breakingTrack');
if(allItems.length>0){
let existing=track.innerHTML;
let newHtml=allItems.map(a=>`<a class='breaking-link' href='${safeHref(a.link)}' target='_blank'>[${esc(a.source)}] ${esc(a.title)}</a>`).join('');
track.innerHTML=newHtml+(existing?existing:'');
banner.classList.add('active')}
}
checkBreaking();setInterval(checkBreaking,120000);
loadTicker();loadNews();
async function fetchPrices(){
let gotGold=false,gotSilver=false,gotBrent=false;
try{const r=await fetch('https://scanner.tradingview.com/global/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbols:{tickers:['TVC:GOLD','TVC:SILVER','NYMEX:BB1!']},columns:['close']})});const d=await r.json();d.data.forEach(item=>{if(item.s==='TVC:GOLD'){document.getElementById('priceGold').textContent=Math.round(item.d[0]).toLocaleString();gotGold=true}if(item.s==='TVC:SILVER'){document.getElementById('priceSilver').textContent=item.d[0].toFixed(2);gotSilver=true}if(item.s.includes('BB1')){document.getElementById('priceBrent').textContent=item.d[0].toFixed(1);gotBrent=true}})}catch(e){}
if(!gotGold){try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd');const d=await r.json();document.getElementById('priceGold').textContent=Math.round(d['pax-gold'].usd).toLocaleString()}catch(e){}}
if(!gotSilver){try{const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/SI=F?interval=1d&range=1d'));const w=await r.json();const d=JSON.parse(w.contents);document.getElementById('priceSilver').textContent=d.chart.result[0].meta.regularMarketPrice.toFixed(2)}catch(e){}}
if(!gotBrent){try{const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/BZ=F?interval=1d&range=1d'));const w=await r.json();const d=JSON.parse(w.contents);document.getElementById('priceBrent').textContent=d.chart.result[0].meta.regularMarketPrice.toFixed(1)}catch(e){}}
try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');const d=await r.json();document.getElementById('priceBtc').textContent=Math.round(d.bitcoin.usd).toLocaleString()}catch(e){}
}
fetchPrices();setInterval(fetchPrices,60000);
</script>
